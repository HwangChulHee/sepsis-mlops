# H4s-c — serving Service (ClusterIP). Exposes /predict, /health, /metrics on port 80.
apiVersion: v1
kind: Service
metadata:
  name: sepsis-serving
  labels:
    app: sepsis-serving
spec:
  type: ClusterIP
  selector:
    app: sepsis-serving
  ports:
    - name: http
      port: 80
      targetPort: 8000
