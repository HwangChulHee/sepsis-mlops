# H4s-c — serving Deployment. replicas=1 is REQUIRED: per-patient hidden state is held
# in-memory (StatefulPredictor); >1 replica would split a patient's stream across pods and
# break causal continuity. Scaling out needs a shared store (Redis) first (deferred).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sepsis-serving
  labels:
    app: sepsis-serving
spec:
  replicas: 1                       # in-memory per-patient state -> single replica
  # Recreate: 롤링이면 잠깐 2파드가 떠 환자별 in-memory hidden state(StatefulPredictor)·
  # 공유 PVC(RWO) 가정이 깨진다. 옛 파드를 먼저 종료 후 새 파드 기동.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: sepsis-serving
  template:
    metadata:
      labels:
        app: sepsis-serving
    spec:
      # fsGroup: 공유 번들 PVC 를 비-root(uid 10001) 가 읽도록 볼륨 소유 그룹 정렬.
      securityContext:
        fsGroup: 10001
      containers:
        - name: serving
          image: sepsis-serving:h4s
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          # 비-root 실행 + 권한상승/캡 전부 제거(공격면 축소).
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            # serve app.py 는 활성 alias gru_<fs> 를 ARTIFACTS 아래에서 직접 해석한다(결정 5).
            # featureset 만 외부에서 선택 — 레거시 RUN/SERVE_BUNDLE_DIR 고정경로 env 는 alias
            # 통일(mn-B)로 폐기됨(app.py 는 SERVE_FEATURESET 만 읽음). 빠진 env 참조 제거.
            - name: SERVE_FEATURESET
              valueFrom:
                configMapKeyRef:
                  name: sepsis-serving-config
                  key: SERVE_FEATURESET
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: sepsis-serving-config
                  key: LOG_LEVEL
            # BLAS 스레드 캡(★ 부팅 캘리브레이션 스로틀 방지). numpy/BLAS 는 기본적으로 *노드*
            # 코어 수(예: 20)만큼 스레드를 띄우는데, cgroup CPU limit(아래 2코어)이 그보다 작으면
            # 스레드들이 소수 코어를 두고 thrash 해 300-trial 캘리브레이션이 10s→60s+ 로 폭발,
            # startupProbe(timeout 10s)를 무한 실패시켜 파드가 0/1 에 갇힌다(검증됨). CPU 할당에
            # 맞춰 스레드를 캡하면 oversubscription 이 사라져 정상 속도로 부팅된다. limits.cpu 와
            # 함께 조정할 것(값 = 대략 CPU 코어 수).
            - {name: OMP_NUM_THREADS, value: "2"}
            - {name: OPENBLAS_NUM_THREADS, value: "2"}
            - {name: MKL_NUM_THREADS, value: "2"}
            - {name: NUMEXPR_NUM_THREADS, value: "2"}
          # startupProbe: 첫 /health 는 state()→_load_all 로 torch 로드 + 300-trial 캘리브레이션을
          # _LOCK 아래 동기 수행한다(app.py, synthetic.calibrate n_trials=300). liveness 가
          # 그 부팅창에 걸리면 기본 1s 타임아웃/3회 실패로 파드가 죽어 크래시루프가 된다.
          # startupProbe 가 통과할 때까지 liveness/readiness 는 유예된다 → 부팅 예산 확보
          # (30×10s = 최대 300s). 통과 후엔 /health 가 캐시된 _S 를 반환해 값싸다.
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 30       # ~300s 부팅 예산(캘리브레이션 포함)
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5          # 기본 1s 는 로드된 뒤에도 GC/락 순간에 오탐 위험
            failureThreshold: 3
          volumeMounts:
            # B2 — 공유 번들 PVC를 console-api와 동일 경로에 마운트. serve는 ARTIFACTS(기본
            # /app/deploy/artifacts) 아래 alias gru_<fs>를 읽으므로, 콘솔이 PVC에 쓴 alias를
            # 보려면 같은 PVC를 같은 경로에 마운트해야 한다(빠지면 전파 silent 단절).
            - name: artifacts
              mountPath: /app/deploy/artifacts
          resources:
            requests:
              cpu: "500m"          # 부팅 캘리브레이션(CPU-bound) 여유 — 스로틀 시 probe 실패
              memory: "512Mi"
            limits:
              cpu: "2"             # BLAS 스레드 캡(env *_NUM_THREADS=2)과 정렬 — 초과 시 thrash
              memory: "1Gi"
      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: sepsis-artifacts
