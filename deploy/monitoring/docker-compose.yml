# 로컬 모니터링 스택 — Prometheus + Grafana(+ image-renderer).
# 서빙(호스트 uvicorn 127.0.0.1:8000)의 /metrics 를 긁어 Grafana 대시보드로 본다.
# 리플레이어 Gauge 곡선(serve_pred_prob_latest)을 보려면 서빙을 SERVE_PER_PATIENT_GAUGE=1 로 띄울 것.
#
# 사용:
#   (호스트) SERVE_PER_PATIENT_GAUGE=1 PYTHONPATH=src uv run uvicorn sepsis.serve.app:app --port 8000
#   docker compose -f deploy/monitoring/docker-compose.yml up -d
#   → Grafana http://localhost:3000 (anonymous Admin), 대시보드 "Sepsis — Drift & Serving (watch)"
#   패널 PNG 렌더: http://localhost:3000/render/d-solo/sepsis-drift/x?panelId=7&from=now-15m&to=now&width=1200&height=500
services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: sepsis-prometheus
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"   # 컨테이너에서 호스트 서빙 접근(Linux/WSL)
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.2.0
    container_name: sepsis-grafana
    depends_on: [prometheus, renderer]
    environment:
      # 데모 편의: 익명 Admin(로그인 없이 보기·렌더). 운영에선 끄고 인증 둘 것.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      # 패널→PNG 렌더 사이드카 배선.
      GF_RENDERING_SERVER_URL: "http://renderer:8081/render"
      GF_RENDERING_CALLBACK_URL: "http://grafana:3000/"
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - "3000:3000"

  renderer:
    image: grafana/grafana-image-renderer:3.11.6
    container_name: sepsis-grafana-renderer
    environment:
      ENABLE_METRICS: "false"
