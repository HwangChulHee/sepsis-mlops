# Grafana 대시보드 ConfigMap — deploy/grafana/dashboards/ 에서 생성(단일 출처).
# 재생성: kubectl create configmap grafana-dashboards --from-file=deploy/grafana/dashboards/ --dry-run=client -o yaml
apiVersion: v1
data:
  drift.json: |
    {
      "title": "Sepsis — Drift & Serving (watch)",
      "uid": "sepsis-drift",
      "tags": ["sepsis", "drift", "h4"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": {"from": "now-7d", "to": "now"},
      "templating": {"list": []},
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Per-feature drift distance (PSI/JS)",
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [
            {"expr": "drift_value_distance", "legendFormat": "{{feature}}"}
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Per-feature missing-rate JS",
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [
            {"expr": "drift_missing_js", "legendFormat": "{{feature}}"}
          ]
        },
        {
          "id": 3,
          "type": "state-timeline",
          "title": "Per-feature watch state (1 = drift observed)",
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "targets": [
            {"expr": "drift_state", "legendFormat": "{{feature}}"}
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Dataset drift share / insufficient-data",
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "targets": [
            {"expr": "drift_dataset_share", "legendFormat": "share"},
            {"expr": "drift_insufficient_data", "legendFormat": "insufficient"}
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Prediction probability distribution",
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16},
          "targets": [
            {"expr": "rate(serve_pred_prob_bucket[5m])", "legendFormat": "{{le}}"}
          ]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Serving input feature values (observed)",
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16},
          "targets": [
            {"expr": "serve_input_feature_value_count", "legendFormat": "{{feature}}"}
          ]
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Per-patient risk (latest p) — replay [SERVE_PER_PATIENT_GAUGE=1]",
          "description": "환자별 최신 위험도 곡선(리플레이어 라운드 다). 옵트인 메트릭이라 서버를 SERVE_PER_PATIENT_GAUGE=1 로 띄운 동안만 채워진다(카디널리티 footgun 가드).",
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 24},
          "fieldConfig": {"defaults": {"min": 0, "max": 1, "custom": {"drawStyle": "line", "spanNulls": true}}},
          "targets": [
            {"expr": "serve_pred_prob_latest", "legendFormat": "{{patient_id}}"}
          ]
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Serving input missing rate (per feature)",
          "description": "피처별 결측(NaN) 입력 유입률 — 공변량 드리프트의 결측 축(serve_input_missing_total). serve_input_feature_value 의 값 축과 짝을 이룬다.",
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 32},
          "targets": [
            {"expr": "rate(serve_input_missing_total[5m])", "legendFormat": "{{feature}}"}
          ]
        }
      ]
    }
  serving_slo.json: |-
    {
      "uid": "sepsis-serving-slo",
      "title": "Sepsis — Serving SLO & Health (G3·G4)",
      "schemaVersion": 39,
      "refresh": "30s",
      "time": { "from": "now-6h", "to": "now" },
      "templating": { "list": [] },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "G3 · Predict latency p95 / p99 (s)",
          "description": "histogram_quantile over serve_predict_latency_seconds. SLO 지연 상한 추적.",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(serve_predict_latency_seconds_bucket[5m])) by (le))",
              "legendFormat": "p95"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(serve_predict_latency_seconds_bucket[5m])) by (le))",
              "legendFormat": "p99"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "G3 · Predict throughput (req/s)",
          "description": "rate(serve_predict_requests_total). 처리량.",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "rate(serve_predict_requests_total[5m])",
              "legendFormat": "req/s"
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "G3 · Alarm rate (p >= tau 비율)",
          "description": "alarms / predicts. 에러율 패널은 serve에 에러 카운터가 없어 부재 — serve_predict_errors_total 추가 시 보강(범위 외 권고).",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "rate(serve_alarms_total[5m]) / rate(serve_predict_requests_total[5m])",
              "legendFormat": "alarm share"
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "G4 · Serving up/down",
          "description": "up{job=\"sepsis-serving\"}. job 라벨은 Prometheus scrape 설정 종속 [검증 필요].",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "up{job=\"sepsis-serving\"}",
              "legendFormat": "up"
            }
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "G4 · Predict liveness (req/min)",
          "description": "rate(serve_predict_requests_total[1m]). 추론이 살아있다는 신호.",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "targets": [
            {
              "expr": "rate(serve_predict_requests_total[1m])",
              "legendFormat": "predict/min"
            }
          ]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "G4 · Health scrape (req/min)",
          "description": "rate(serve_health_requests_total[1m]). /health 호출 빈도. 활성 모델 run_id는 메트릭이 아니라 /health JSON → 콘솔 StatusBar 몫(Grafana 아님).",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "targets": [
            {
              "expr": "rate(serve_health_requests_total[1m])",
              "legendFormat": "health/min"
            }
          ]
        }
      ]
    }
kind: ConfigMap
metadata:
  name: grafana-dashboards
  labels: {app: grafana}
