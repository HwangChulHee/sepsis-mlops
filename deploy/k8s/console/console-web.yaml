# 운영 콘솔 웹 — console-web Deployment + Service + nginx 설정 (결정 2).
#
# nginx가 vite build 산출물(dist/)을 정적 서빙한다. React는 stateless라 replicas 증설 자유지만
# 단일 운영 콘솔이라 1로 시작. console-web은 console-api를 직접 모르고, 브라우저가 /console/*를
# 상대경로로 부르면 Ingress가 console-api로 라우팅한다(동일 출처 → CORS 없음).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sepsis-console-web
  labels:
    app: sepsis-console-web
spec:
  replicas: 2                        # stateless 정적 서빙 — HA 위해 2 (서로 독립, 공유상태 없음)
  selector:
    matchLabels:
      app: sepsis-console-web
  template:
    metadata:
      labels:
        app: sepsis-console-web
    spec:
      containers:
        - name: console-web
          # [검증 필요] 이미지: nginxinc/nginx-unprivileged 베이스에 vite build dist/ 복사.
          # 비-root(uid 101)·port 8080 전제 — console-web/Dockerfile 과 일관(80→8080 전환).
          image: sepsis-console-web:a
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080         # nginx-unprivileged 는 비-root 라 80 바인드 불가 → 8080
          # 비-root 실행. nginx-unprivileged 이미지의 기본 uid 101 사용(해당 이미지의 캐시·임시
          # 디렉토리 소유가 101 기준이라 임의 uid 대신 101 이 가장 안전). 권한상승/캡 전부 제거.
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            # readOnlyRootFilesystem: nginx 가 /tmp·/var/cache/nginx 에 써야 해 이번엔 생략(후속 빚).
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          # liveness: readiness 보다 관대(긴 initialDelay·큰 threshold) — 행 걸린 nginx만 재시작.
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 6
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
      volumes:
        - name: nginx-conf
          configMap:
            name: sepsis-console-web-nginx
---
# nginx 설정 — SPA 폴백(클라이언트 라우팅 대비). /console/* 는 Ingress가 가로채므로 여기 없음.
apiVersion: v1
kind: ConfigMap
metadata:
  name: sepsis-console-web-nginx
  labels:
    app: sepsis-console-web
data:
  default.conf: |
    server {
      listen 8080;                          # 비-root nginx-unprivileged → 8080 (80 바인드 불가)
      root /usr/share/nginx/html;
      index index.html;
      location / {
        try_files $uri $uri/ /index.html;   # SPA 폴백
      }
    }
---
# console-web Service (ClusterIP) — Ingress가 / 를 여기로 보낸다.
# Service port 는 80 유지(Ingress 가 number: 80 참조) — targetPort 만 컨테이너 8080 으로.
apiVersion: v1
kind: Service
metadata:
  name: sepsis-console-web
  labels:
    app: sepsis-console-web
spec:
  type: ClusterIP
  selector:
    app: sepsis-console-web
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
# PodDisruptionBudget — 노드 드레인/롤링 중에도 최소 1파드 가용 보장(stateless 라 안전).
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: sepsis-console-web
  labels:
    app: sepsis-console-web
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: sepsis-console-web
