name: CI

# 주제가 "배포해도 안 무너지는 운영 가능한 시스템"인 만큼, 회귀는 로컬 수동이 아니라
# 여기서 자동으로 잡는다. 테스트는 하드 게이트, 린트는 ratchet(초기 정보성 → 잔여 정리 후 blocking).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync deps (project + dev group)
        run: uv sync --frozen

      # console·console_prep·replay 전 스위트. console_prep 은 데이터 캐시 없이도
      # hermetic(conftest 가 manifest/reference 빌드를 격리) — CI 에서 그대로 돈다.
      - name: Run tests with coverage
        run: uv run pytest --cov --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn

  lint:
    name: ruff
    runs-on: ubuntu-latest
    # blocking 게이트. 실버그류(F·B904·B017)는 코드에서 고쳤고, 판단성 스타일(E741·E702·
    # E731·B905)·스크립트 pre-import(E402)는 pyproject 에서 의도적으로 ignore 했다 → 0 findings.
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync deps
        run: uv sync --frozen

      - name: ruff check
        run: uv run ruff check --output-format=github .

  frontend:
    name: console-web (Node 22)
    runs-on: ubuntu-latest
    # 운영 콘솔 프론트: 지금까지 로컬 node 수동 셋업으로만 검증됐다 — lint·타입체크·테스트를
    # CI 게이트로 올려 파이썬(test·ruff)과 대칭으로 회귀를 막는다.
    defaults:
      run:
        working-directory: console-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: console-web/package-lock.json

      - name: Install deps (lockfile 고정)
        run: npm ci

      - name: eslint
        run: npm run lint

      - name: typecheck + build
        run: npm run build

      - name: vitest
        run: npm test

  manifests:
    name: k8s manifests + Dockerfiles
    runs-on: ubuntu-latest
    # 배포물(매니페스트·Dockerfile)도 파이썬·프론트와 대칭으로 게이트한다. 손으로 고친 YAML 의
    # 스키마 오류·오타가 머지되는 걸 막는다(지금까진 무검증이었다). 클러스터 불필요 — 오프라인 검증.
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | tar -xz -C /usr/local/bin kubeconform

      # -strict: 알 수 없는 필드 거부. -ignore-missing-schemas: CRD 등 스키마 없는 것만 skip(현재 없음).
      - name: Validate k8s manifests (kubeconform)
        run: kubeconform -strict -ignore-missing-schemas -summary deploy/k8s

      - name: Install hadolint
        run: |
          curl -sSL -o /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      # --failure-threshold error: 하드 에러만 실패(스타일성 info/warning 은 통과) — 게이트가
      # nitpick 으로 빨개지지 않게. 강화하려면 warning 으로 낮출 것.
      - name: Lint Dockerfiles (hadolint)
        run: |
          for df in deploy/Dockerfile deploy/k8s/console/Dockerfile.api console-web/Dockerfile; do
            echo "== $df =="
            hadolint --failure-threshold error "$df"
          done
