# 운영 콘솔 API — console-api Deployment + Service (결정 2·5·7).
#
# - replicas=1 REQUIRED: 승인/롤백 직렬화 경계가 프로세스-로컬 락(_LOCKS, 결정 7-1)이다.
#   >1 replica면 운영자 2명이 서로 다른 pod에서 동시 승인 → prev 갈라짐. scale-out 하려면
#   먼저 공유 저장소 기반 락(DB advisory lock 등)으로 승격해야 한다(결정 7-1 의존).
# - 부팅 lifespan(service.lifespan)이 라우팅 개시 전 alias↔감사 화해/seed를 끝낸다(결정 7-1).
# - 공유 PVC를 /app/deploy/artifacts 에 마운트: console-api는 ARTIFACTS_DIR 같은 env를 읽지
#   않고 deploy.ARTIFACTS(=C.ROOT/deploy/artifacts) 고정 경로를 쓴다(B2). 그래서 env가 아니라
#   **마운트 경로를 serving과 동일하게** 맞추는 것이 전파 정합의 핵심.
# - SERVE_URL: _propagate_and_confirm 이 swap 후 serving에 /admin/reload·/health를 호출하는
#   대상. serving Service(sepsis-serving, port 80)를 가리킨다.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sepsis-console-api
  labels:
    app: sepsis-console-api
spec:
  replicas: 1                       # 직렬화 경계(프로세스-로컬 락) -> 단일 replica
  # Recreate: 롤링이면 잠깐 2파드가 떠 프로세스-로컬 락(_LOCKS)·in-memory 직렬화 가정이
  # 깨지고, 두 파드가 같은 audit PVC(RWO)를 동시에 못 쓴다. 옛 파드를 먼저 죽이고 새 파드를
  # 띄운다(짧은 다운타임 < 직렬화 위반).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: sepsis-console-api
  template:
    metadata:
      labels:
        app: sepsis-console-api
    spec:
      # fsGroup: 마운트한 PVC(번들·감사 DB) 볼륨 소유 그룹을 10001 로 맞춰 비-root(uid 10001)
      # 컨테이너가 쓰기 가능하게 한다. 빠지면 runAsNonRoot 가 PVC 에 write 못 해 부팅 실패.
      securityContext:
        fsGroup: 10001
      containers:
        - name: console-api
          # [검증 필요] 이미지: console API용 이미지(uvicorn sepsis.console.api:app) 빌드 필요.
          # serving 이미지와 같은 베이스에 진입점만 다르게 둘 수 있다.
          image: sepsis-console:a
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "sepsis.console.api:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
          # 비-root 실행: root 로 돌 이유가 없고, 권한상승/캡 전부 제거로 공격면 축소.
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            # readOnlyRootFilesystem: sqlite WAL/임시파일 때문에 이번엔 생략 — 후속(M4 빚).
          env:
            - name: SERVE_URL
              value: "http://sepsis-serving"        # serving Service(port 80) — 전파 확인 대상
            - name: LOG_LEVEL
              value: "info"
            # 감사 DB 위치(백엔드와 합의된 계약). 슬래시 4개 = 절대경로 /app/auditdb/console_audit.db.
            # 이 경로는 영속 PVC(sepsis-console-audit) 위라 재시작/재배포에도 감사 이력이 보존된다.
            - name: CONSOLE_AUDIT_DB_URL
              value: "sqlite:////app/auditdb/console_audit.db"
          volumeMounts:
            - name: artifacts
              mountPath: /app/deploy/artifacts       # serving과 동일 고정 경로(B2)
            - name: auditdb
              mountPath: /app/auditdb                # 감사 DB 영속(CONSOLE_AUDIT_DB_URL)
          readinessProbe:
            httpGet:
              path: /console/versions?fs=vitals      # [검증 필요] 빈 클러스터에서도 200인지 확인
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          # liveness: readiness 와 같은 엔드포인트지만 더 관대하게(긴 initialDelay·큰 failure
          # threshold) — 일시 지연으로 파드를 죽이지 않도록. 진짜 데드락/행만 재시작 유도.
          livenessProbe:
            httpGet:
              path: /console/versions?fs=vitals
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: sepsis-artifacts
        - name: auditdb
          persistentVolumeClaim:
            claimName: sepsis-console-audit
---
# console-api Service (ClusterIP) — Ingress가 /console/* 를 여기로 보낸다.
apiVersion: v1
kind: Service
metadata:
  name: sepsis-console-api
  labels:
    app: sepsis-console-api
spec:
  type: ClusterIP
  selector:
    app: sepsis-console-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
