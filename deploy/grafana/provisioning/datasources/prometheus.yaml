# H4d-b — Grafana datasource (standard, no external repo). Prometheus scrapes serving /metrics.
apiVersion: 1
datasources:
  - name: Prometheus
    type: prometheus
    uid: Prometheus          # 대시보드 패널이 참조하는 고정 uid(드리프트/리플레이 패널 바인딩)
    access: proxy
    url: http://prometheus:9090
    isDefault: true
