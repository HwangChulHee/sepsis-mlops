# H4s-c — serving config. RUN selects the (atomic) exported bundle dir.
# Swap the served model/featureset by changing RUN (= deploy/artifacts/<RUN>) and
# rolling the Deployment. NOTE: the alarm threshold τ is NOT here — it is frozen inside
# the bundle (A-val derived); overriding τ operationally would re-select on live data
# (leakage, H3/H4 rule). ConfigMap holds only non-leaky operational settings.
apiVersion: v1
kind: ConfigMap
metadata:
  name: sepsis-serving-config
  labels:
    app: sepsis-serving
data:
  RUN: "gru_vitals"          # atomic bundle: gru_vitals | gru_vitals_labs
  LOG_LEVEL: "info"
