# 통합 Compose 스택(deploy/docker-compose.yml)용 Prometheus 설정 — serving 컨테이너의 /metrics 스크랩.
# ⚠️ 스탠드얼론 모니터링(deploy/monitoring/docker-compose.yml, 호스트 uvicorn 서빙)은 이 파일이 아니라
#    `prometheus.host.yml`(host.docker.internal)을 쓴다 — 서비스명 serving 은 그 스택에 없기 때문.
# 리플레이 데모는 빠르게 변하므로 scrape_interval 을 짧게(2s) — Gauge 곡선을 촘촘히 표본한다.
# (운영 기본은 15s 권장; 이건 데모/증거용.)
global:
  scrape_interval: 2s
  evaluation_interval: 2s

scrape_configs:
  - job_name: sepsis-serving
    metrics_path: /metrics
    static_configs:
      # serving 은 이제 통합 스택의 compose 서비스 → 내장 DNS 서비스명으로 도달(결정 4·CG-6).
      # (구: 호스트 uvicorn 을 host.docker.internal 로 스크랩 — serving 컨테이너화로 폐기.)
      - targets: ["serving:8000"]
