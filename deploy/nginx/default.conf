# front nginx — K8s Ingress 라우팅 이식(결정 3). 라우팅만, 정적 서빙 안 함.
#   /console/* → console-api:8000 (승인/롤백/감사 API)
#   /         → console-web:8080 (SPA, 자체 nginx 정적 서빙)
# 브라우저는 동일 출처(front-nginx:80)만 보므로 CORS 미발생. rewrite 불필요
# (console-api 라우트가 이미 /console/* 접두라 접두 보존 프록시).
server {
    listen 80;
    server_name _;

    location /console/ {
        proxy_pass http://console-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://console-web:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
